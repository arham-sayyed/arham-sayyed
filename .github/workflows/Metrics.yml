name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: arham-sayyed
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          filename: metrics.plugin.isocalendar.svg
